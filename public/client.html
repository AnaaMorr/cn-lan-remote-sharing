<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Remote Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LAN Remote Viewer</h1>
            <p>Connect to a remote screen sharing session</p>
        </header>

        <div class="connection-section">
            <div class="input-group">
                <label for="serverIP">Server IP Address:</label>
                <input type="text" id="serverIP" placeholder="e.g., 192.168.1.100" required>
            </div>
            <button id="connectBtn" class="connect-btn">Connect</button>
            <div id="status" class="status">Not connected</div>
        </div>

        <div class="video-section">
            <video id="remoteVideo" autoplay controls></video>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
