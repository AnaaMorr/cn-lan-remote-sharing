<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Host Screen</h1>
            <p>You're sharing your screen. Close the tab to stop.</p>
        </header>

        <div class="video-section">
            <video id="localVideo" autoplay muted></video>
        </div>

        <div class="info-section">
            <p>Send this IP address to your viewer:</p>
            <pre id="ipAddress">fetching...</pre>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="host.js"></script>
    <script>
        // display local IP addresses matching server log
        async function fetchIPs() {
            try {
                const res = await fetch('/ips');
                const ips = await res.json();
                document.getElementById('ipAddress').textContent = ips.join('\n');
            } catch (e) {
                document.getElementById('ipAddress').textContent = 'unable to fetch IP';
            }
        }
        fetchIPs();
    </script>
</body>
</html>
