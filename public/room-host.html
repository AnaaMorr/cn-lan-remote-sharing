<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Session - Remote Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="host-layout">
        <!-- Main video section -->
        <div class="host-video-section">
            <div class="card" style="padding: 0;">
                <div class="host-video-container">
                    <video id="localVideo" autoplay muted playsinline></video>
                </div>
            </div>
            
            <div class="host-controls">
                <button id="startBtn" class="btn btn-primary btn-lg" style="flex: 1;" onclick="startSharing()">
                    ▶ Start Sharing
                </button>
                <button id="stopBtn" class="btn btn-danger btn-lg hidden" style="flex: 1;" onclick="stopSharing()">
                    ⏹ Stop Sharing
                </button>
                <button class="btn btn-secondary" title="Copy Share Link" onclick="copyShareLink()">
                    📋
                </button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="host-sidebar">
            <!-- Connection Info Card -->
            <div class="sidebar-card">
                <div class="card-header">
                    <h3 style="font-size: 1.125rem; margin: 0;">Session Info</h3>
                </div>
                <p style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 1rem;">
                    Share this link with clients:
                </p>
                <div style="background: rgba(15, 23, 42, 0.5); padding: 0.75rem; border-radius: 0.5rem; word-break: break-all; font-size: 0.75rem; color: #e2e8f0; font-family: monospace;">
                    <span id="shareLink">Loading...</span>
                </div>
            </div>

            <!-- Status Card -->
            <div class="sidebar-card">
                <div class="card-header">
                    <h3 style="font-size: 1.125rem; margin: 0;">Status</h3>
                </div>
                <div class="status-item">
                    <div class="status-dot offline" id="statusDot"></div>
                    <div>
                        <div style="font-weight: 600; font-size: 0.875rem;">Connection</div>
                        <div style="color: #94a3b8; font-size: 0.75rem;" id="connectionStatus">Initializing...</div>
                    </div>
                </div>
                <div class="status-item">
                    <div style="font-size: 2rem;">👥</div>
                    <div>
                        <div style="font-weight: 600; font-size: 0.875rem;">Connected Clients</div>
                        <div style="color: #94a3b8; font-size: 0.75rem;" id="clientCount">0</div>
                    </div>
                </div>
            </div>

            <!-- Clients List -->
            <div class="sidebar-card">
                <div class="card-header">
                    <h3 style="font-size: 1rem; margin: 0;">Clients</h3>
                </div>
                <div id="clientsList" style="font-size: 0.875rem; color: #94a3b8;">
                    No clients connected
                </div>
            </div>
            
            <!-- Return Button -->
            <button class="btn btn-secondary" style="width: 100%;" onclick="goHome()">
                ← Back to Home
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="room-host.js"></script>
</body>
</html>
